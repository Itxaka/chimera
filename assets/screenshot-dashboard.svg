<svg width="880" height="430" viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, sans-serif">
  <rect width="880" height="430" rx="10" fill="#ffffff" stroke="#e2e6ea"/>
  <!-- window chrome -->
  <rect width="880" height="38" rx="10" fill="#f1f3f5"/>
  <rect y="28" width="880" height="10" fill="#f1f3f5"/>
  <circle cx="22" cy="19" r="6" fill="#ff5f57"/><circle cx="42" cy="19" r="6" fill="#febc2e"/><circle cx="62" cy="19" r="6" fill="#28c840"/>
  <text x="440" y="24" text-anchor="middle" font-size="13" fill="#8a949e">Chimera</text>

  <!-- header -->
  <text x="32" y="86" font-size="30" font-weight="700" fill="#1b2530">Chimera</text>
  <rect x="720" y="64" width="128" height="34" rx="6" fill="#273341"/>
  <text x="784" y="86" text-anchor="middle" font-size="14" fill="#fff">+ New VM</text>

  <!-- table header -->
  <line x1="32" y1="120" x2="848" y2="120" stroke="#eee"/>
  <text x="40"  y="142" font-size="13" font-weight="600" fill="#6b7682">Name</text>
  <text x="250" y="142" font-size="13" font-weight="600" fill="#6b7682">Status</text>
  <text x="420" y="142" font-size="13" font-weight="600" fill="#6b7682">vCPU</text>
  <text x="510" y="142" font-size="13" font-weight="600" fill="#6b7682">Memory</text>
  <text x="660" y="142" font-size="13" font-weight="600" fill="#6b7682">Actions</text>
  <line x1="32" y1="154" x2="848" y2="154" stroke="#eee"/>

  <!-- row 1: running -->
  <text x="40" y="188" font-size="14" fill="#1b2530" text-decoration="underline">web-1</text>
  <rect x="250" y="174" width="66" height="20" rx="4" fill="#d1f7d1"/><text x="283" y="188" text-anchor="middle" font-size="12" fill="#236b23">running</text>
  <text x="420" y="188" font-size="14" fill="#1b2530">4</text>
  <text x="510" y="188" font-size="14" fill="#1b2530">2048 MiB</text>
  <g font-size="12">
    <rect x="660" y="173" width="44" height="22" rx="4" fill="#eef1f4"/><text x="682" y="188" text-anchor="middle" fill="#33414f">Stop</text>
    <rect x="710" y="173" width="52" height="22" rx="4" fill="#eef1f4"/><text x="736" y="188" text-anchor="middle" fill="#33414f">Pause</text>
    <rect x="768" y="173" width="56" height="22" rx="4" fill="#eef1f4"/><text x="796" y="188" text-anchor="middle" fill="#33414f">Delete</text>
  </g>
  <line x1="32" y1="208" x2="848" y2="208" stroke="#eee"/>

  <!-- row 2: stopped -->
  <text x="40" y="242" font-size="14" fill="#1b2530" text-decoration="underline">db-1</text>
  <rect x="250" y="228" width="66" height="20" rx="4" fill="#eeeeee"/><text x="283" y="242" text-anchor="middle" font-size="12" fill="#555">stopped</text>
  <text x="420" y="242" font-size="14" fill="#1b2530">2</text>
  <text x="510" y="242" font-size="14" fill="#1b2530">1024 MiB</text>
  <g font-size="12">
    <rect x="660" y="227" width="48" height="22" rx="4" fill="#eef1f4"/><text x="684" y="242" text-anchor="middle" fill="#33414f">Start</text>
    <rect x="714" y="227" width="56" height="22" rx="4" fill="#eef1f4"/><text x="742" y="242" text-anchor="middle" fill="#33414f">Delete</text>
  </g>
  <line x1="32" y1="262" x2="848" y2="262" stroke="#eee"/>

  <!-- row 3: failed + error sub-row -->
  <text x="40" y="296" font-size="14" fill="#1b2530" text-decoration="underline">build-runner</text>
  <rect x="250" y="282" width="60" height="20" rx="4" fill="#f7d1d1"/><text x="280" y="296" text-anchor="middle" font-size="12" fill="#8a1f1f">failed</text>
  <text x="318" y="296" font-size="13" fill="#b00">⚠</text>
  <text x="420" y="296" font-size="14" fill="#1b2530">1</text>
  <text x="510" y="296" font-size="14" fill="#1b2530">512 MiB</text>
  <g font-size="12">
    <rect x="660" y="281" width="48" height="22" rx="4" fill="#eef1f4"/><text x="684" y="296" text-anchor="middle" fill="#33414f">Start</text>
    <rect x="714" y="281" width="56" height="22" rx="4" fill="#eef1f4"/><text x="742" y="296" text-anchor="middle" fill="#33414f">Delete</text>
  </g>
  <text x="40" y="320" font-size="12" fill="#b00">⚠ boot: tap: netd failed (code 1): Cannot find device "br0"</text>
  <line x1="32" y1="336" x2="848" y2="336" stroke="#eee"/>

  <text x="32" y="404" font-size="12" fill="#9aa4ae">Polls every 3s · click a name for VM detail + console · mockup of the live UI</text>
</svg>
